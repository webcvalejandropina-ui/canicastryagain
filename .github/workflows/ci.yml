name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run lint --if-present
        continue-on-error: true

      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

      - name: Verify production build exists
        run: test -d .nextstandalone || test -d .next/server

  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t canicas-try-again:test .

      - name: Run container health check
        run: |
          docker run -d -p 127.0.0.1:3001:3000 --name canicas-test canicas-try-again:test
          sleep 5
          curl -sf http://127.0.0.1:3001/ || exit 1
          docker stop canicas-test
