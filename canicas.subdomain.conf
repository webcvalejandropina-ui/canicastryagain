# Nginx: Canicas Try Again (subdominio)
# Colocar en /etc/nginx/sites-available/ y enlazar en sites-enabled
# Ajusta server_name con tu dominio real (ej: canicas.midominio.com)

server {
    listen 80;
    listen [::]:80;
    server_name canicas.tudominio.com;

    location / {
        proxy_pass http://127.0.0.1:13000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets (útil si la app usa conexiones en tiempo real)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
