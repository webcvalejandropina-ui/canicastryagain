# Stack para Portainer: Canicas Try Again
# La configuración (puertos, env, volumen) se gestiona desde Portainer.

services:
  canicas:
    image: canicas-try-again:latest
    container_name: canicas
    restart: unless-stopped
    ports:
      - "13000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      SQLITE_PATH: /app/data/game.db
      ADMIN_ALIAS: songoku
    volumes:
      - canicas_data:/app/data

volumes:
  canicas_data:
