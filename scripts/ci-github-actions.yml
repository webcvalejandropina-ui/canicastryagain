# Copia este archivo a .github/workflows/ci.yml y haz commit (requiere permiso
# "workflow" en GitHub: gh auth refresh -h github.com -s workflow).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Game rules
        run: npm run test:rules

      - name: Build
        run: npm run build
